name: "python-fastapi"
version: "1.0.0"
description: "Python 3.11+ with FastAPI, SQLModel, and modern tooling"

commands:
  init: "uv init --python 3.11"
  install: "uv add"
  test: "pytest -v"
  lint: "ruff check ."
  format: "black ."
  type_check: "mypy ."

structure:
  domain: "src/domain"
  application: "src/application"
  infrastructure: "src/infrastructure"
  interfaces: "src/interfaces"
  tests_unit: "tests/unit"
  tests_integration: "tests/integration"
  tests_bdd: "tests/bdd"

patterns:
  - "patterns/authentication/jwt-fastapi.md"
  - "patterns/data-models/user-entity.md"
  - "patterns/api-patterns/restful-crud.md"

dependencies:
  - "fastapi>=0.104.0"
  - "sqlmodel>=0.0.14"
  - "pytest>=7.4.0"
  - "ruff>=0.1.0"
  - "black>=23.0.0"
  - "python-jose[cryptography]>=3.3.0"
  - "passlib[bcrypt]>=1.7.4"

