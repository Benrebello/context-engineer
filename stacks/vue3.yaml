name: "vue3"
version: "1.0.0"
description: "Vue 3 with TypeScript, Vite, Pinia, Tailwind CSS, and modern tooling"

commands:
  init: "npm create vue@latest . -- --typescript --router --pinia --vitest --eslint --prettier"
  install: "npm install"
  dev: "npm run dev"
  test: "npm run test:unit"
  lint: "npm run lint"
  format: "npm run format"
  type_check: "vue-tsc --noEmit"
  build: "npm run build"

structure:
  domain: "src/domain"
  application: "src/application"
  infrastructure: "src/infrastructure"
  interfaces: "src/interfaces"
  components: "src/components"
  composables: "src/composables"
  stores: "src/stores"
  views: "src/views"
  router: "src/router"
  utils: "src/utils"
  tests_unit: "tests/unit"
  tests_integration: "tests/integration"

patterns:
  - "patterns/ui-components/form-validation.md"
  - "patterns/ui-components/data-table.md"
  - "patterns/api-patterns/rest-client.md"
  - "patterns/state-management/pinia-store.md"

dependencies:
  - "vue>=3.4.0"
  - "vue-router>=4.2.0"
  - "pinia>=2.1.0"
  - "typescript>=5.0.0"
  - "vite>=5.0.0"
  - "@vitejs/plugin-vue>=5.0.0"
  - "@tailwindcss/forms>=0.5.0"
  - "@headlessui/vue>=1.7.0"
  - "vitest>=1.0.0"
  - "@vue/test-utils>=2.4.0"
  - "eslint>=8.0.0"
  - "prettier>=3.0.0"
  - "vue-tsc>=1.8.0"
