name: "node-react"
version: "1.0.0"
description: "Node.js 20+ with React, TypeScript, Vite, and Tailwind CSS"

commands:
  init: "npm create vite@latest . -- --template react-ts"
  install: "npm install"
  test: "npm run test"
  lint: "npm run lint"
  format: "npm run format"
  type_check: "npm run type-check"
  build: "npm run build"

structure:
  domain: "src/domain"
  application: "src/application"
  infrastructure: "src/infrastructure"
  interfaces: "src/interfaces"
  components: "src/components"
  hooks: "src/hooks"
  utils: "src/utils"
  tests_unit: "tests/unit"
  tests_integration: "tests/integration"

patterns:
  - "patterns/ui-components/form-validation.md"
  - "patterns/ui-components/data-table.md"
  - "patterns/api-patterns/rest-client.md"

dependencies:
  - "react>=18.2.0"
  - "typescript>=5.0.0"
  - "vite>=5.0.0"
  - "@tailwindcss/forms>=0.5.0"
  - "@headlessui/react>=1.7.0"
  - "vitest>=1.0.0"
  - "eslint>=8.0.0"
  - "prettier>=3.0.0"

