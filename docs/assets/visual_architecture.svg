<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <style>
    .title { font: bold 24px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
    .label { font: 16px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
    .box { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 12; }
    .box-secondary { fill: #fef9c3; stroke: #ca8a04; stroke-width: 2; rx: 12; }
    .arrow { stroke: #1e293b; stroke-width: 2; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
  </defs>
  <text class="title" x="40" y="50">Context Engineer - Component View</text>

  <rect class="box" x="60" y="100" width="250" height="120" />
  <text class="label" x="80" y="140">CLI Layer</text>
  <text class="label" x="80" y="170">• Entry commands</text>
  <text class="label" x="80" y="195">• UX & assistants</text>

  <rect class="box" x="360" y="100" width="250" height="120" />
  <text class="label" x="380" y="140">Core Engine</text>
  <text class="label" x="380" y="170">• Template Engine</text>
  <text class="label" x="380" y="195">• Metrics & Planning</text>

  <rect class="box" x="660" y="100" width="240" height="120" />
  <text class="label" x="680" y="140">Services Layer</text>
  <text class="label" x="680" y="170">• Marketplace</text>
  <text class="label" x="680" y="195">• Reporting</text>

  <rect class="box-secondary" x="180" y="260" width="260" height="120" />
  <text class="label" x="200" y="300">Templates & Patterns</text>
  <text class="label" x="200" y="330">PRPs • Tasks • Docs</text>

  <rect class="box-secondary" x="500" y="260" width="260" height="120" />
  <text class="label" x="520" y="300">Stacks & Plugins</text>
  <text class="label" x="520" y="330">YAML definitions</text>

  <rect class="box" x="360" y="410" width="250" height="100" />
  <text class="label" x="380" y="450">Metrics & Observability</text>
  <text class="label" x="380" y="475">ROI • Phases • ROI</text>

  <line class="arrow" x1="310" y1="160" x2="360" y2="160" />
  <line class="arrow" x1="610" y1="160" x2="660" y2="160" />
  <line class="arrow" x1="485" y1="220" x2="485" y2="260" />
  <line class="arrow" x1="485" y1="380" x2="485" y2="410" />
  <line class="arrow" x1="610" y1="320" x2="660" y2="320" />
  <line class="arrow" x1="420" y1="320" x2="360" y2="320" />
</svg>
