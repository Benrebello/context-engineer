<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="700" viewBox="0 0 1080 700">
  <style>
    .title { font: bold 24px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
    .subtitle { font: italic 14px 'Segoe UI', Arial, sans-serif; fill: #64748b; }
    .label { font: 16px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
    .label-sm { font: 13px 'Segoe UI', Arial, sans-serif; fill: #475569; }
    .box { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 12; }
    .box-secondary { fill: #fef9c3; stroke: #ca8a04; stroke-width: 2; rx: 12; }
    .box-new { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 12; }
    .box-git { fill: #f3e8ff; stroke: #9333ea; stroke-width: 2; rx: 12; }
    .arrow { stroke: #1e293b; stroke-width: 2; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
  </defs>
  <text class="title" x="40" y="50">Context Engineer - Component View v1.2</text>
  <text class="subtitle" x="40" y="72">Architecture with Context Engineering &amp; Git Workflow layers</text>

  <!-- Row 1: Core Layers -->
  <rect class="box" x="40" y="100" width="230" height="130" />
  <text class="label" x="60" y="135">CLI Layer</text>
  <text class="label-sm" x="60" y="158">• Entry commands</text>
  <text class="label-sm" x="60" y="178">• UX &amp; assistants</text>
  <text class="label-sm" x="60" y="198">• discuss, verify, health</text>

  <rect class="box" x="310" y="100" width="250" height="130" />
  <text class="label" x="330" y="135">Core Engine</text>
  <text class="label-sm" x="330" y="158">• Template Engine</text>
  <text class="label-sm" x="330" y="178">• Metrics &amp; Planning</text>
  <text class="label-sm" x="330" y="198">• Wave Executor</text>

  <rect class="box" x="600" y="100" width="220" height="130" />
  <text class="label" x="620" y="135">Services Layer</text>
  <text class="label-sm" x="620" y="158">• Marketplace</text>
  <text class="label-sm" x="620" y="178">• Reporting</text>
  <text class="label-sm" x="620" y="198">• Constitution</text>

  <rect class="box" x="860" y="100" width="180" height="130" />
  <text class="label" x="880" y="135">Intelligence</text>
  <text class="label-sm" x="880" y="158">• Cache (SQLite)</text>
  <text class="label-sm" x="880" y="178">• Embeddings</text>
  <text class="label-sm" x="880" y="198">• Semantic Search</text>

  <!-- Row 2: New Context Engineering + Templates -->
  <rect class="box-new" x="40" y="270" width="280" height="130" />
  <text class="label" x="60" y="305">Context Engineering</text>
  <text class="label-sm" x="60" y="328">• ContextCapture → CONTEXT.md</text>
  <text class="label-sm" x="60" y="348">• ResearchEngine → RESEARCH.md</text>
  <text class="label-sm" x="60" y="368">• VerificationEngine → UAT.md</text>

  <rect class="box-secondary" x="360" y="270" width="260" height="130" />
  <text class="label" x="380" y="305">Templates &amp; Patterns</text>
  <text class="label-sm" x="380" y="328">PRPs • Tasks • Docs</text>
  <text class="label-sm" x="380" y="348">Stacks &amp; YAML Plugins</text>

  <rect class="box-new" x="660" y="270" width="260" height="130" />
  <text class="label" x="680" y="305">Project Management</text>
  <text class="label-sm" x="680" y="328">• HealthChecker → auto-repair</text>
  <text class="label-sm" x="680" y="348">• ExecutionState → STATE.json</text>
  <text class="label-sm" x="680" y="368">• Session → SESSION.json</text>

  <!-- Row 3: Git + Metrics -->
  <rect class="box-git" x="40" y="440" width="280" height="120" />
  <text class="label" x="60" y="475">Git Workflow</text>
  <text class="label-sm" x="60" y="498">• Atomic Commits (ce commit task)</text>
  <text class="label-sm" x="60" y="518">• Commit Map (ce commit map)</text>
  <text class="label-sm" x="60" y="538">• Phase Branching (create/merge)</text>

  <rect class="box" x="360" y="440" width="260" height="120" />
  <text class="label" x="380" y="475">Metrics &amp; Observability</text>
  <text class="label-sm" x="380" y="498">ROI • Token Savings</text>
  <text class="label-sm" x="380" y="518">Rework Rates • Dashboards</text>

  <rect class="box" x="660" y="440" width="260" height="120" />
  <text class="label" x="680" y="475">AI Governance (Soft-Gate)</text>
  <text class="label-sm" x="680" y="498">• LLM Providers (8)</text>
  <text class="label-sm" x="680" y="518">• Git Hooks (Soft/Hard)</text>
  <text class="label-sm" x="680" y="538">• Policy Versioning</text>

  <!-- Arrows -->
  <line class="arrow" x1="270" y1="165" x2="310" y2="165" />
  <line class="arrow" x1="560" y1="165" x2="600" y2="165" />
  <line class="arrow" x1="820" y1="165" x2="860" y2="165" />
  <line class="arrow" x1="435" y1="230" x2="435" y2="270" />
  <line class="arrow" x1="180" y1="230" x2="180" y2="270" />
  <line class="arrow" x1="790" y1="230" x2="790" y2="270" />
  <line class="arrow" x1="180" y1="400" x2="180" y2="440" />
  <line class="arrow" x1="490" y1="400" x2="490" y2="440" />
  <line class="arrow" x1="790" y1="400" x2="790" y2="440" />
  <line class="arrow" x1="320" y1="500" x2="360" y2="500" />
  <line class="arrow" x1="620" y1="500" x2="660" y2="500" />

  <!-- Legend -->
  <rect x="40" y="600" width="16" height="16" fill="#e0f2fe" stroke="#0369a1" stroke-width="1" rx="3" />
  <text class="label-sm" x="62" y="614">Core</text>
  <rect x="120" y="600" width="16" height="16" fill="#dcfce7" stroke="#16a34a" stroke-width="1" rx="3" />
  <text class="label-sm" x="142" y="614">New (v1.2)</text>
  <rect x="230" y="600" width="16" height="16" fill="#fef9c3" stroke="#ca8a04" stroke-width="1" rx="3" />
  <text class="label-sm" x="252" y="614">Templates</text>
  <rect x="350" y="600" width="16" height="16" fill="#f3e8ff" stroke="#9333ea" stroke-width="1" rx="3" />
  <text class="label-sm" x="372" y="614">Git</text>
</svg>
