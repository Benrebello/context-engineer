$schema: "http://json-schema.org/draft-07/schema#"
title: "Stack Plugin Definition"
type: object
required:
  - name
  - version
  - description
  - commands
  - structure
properties:
  name:
    type: string
    minLength: 1
  version:
    type: string
    minLength: 1
  description:
    type: string
    minLength: 1
  commands:
    type: object
    properties:
      init:
        type: string
        minLength: 1
      install:
        type: string
        minLength: 1
      test:
        type: string
        minLength: 1
      lint:
        type: string
        minLength: 1
      build:
        type: string
        minLength: 1
      format:
        type: string
        minLength: 1
      type_check:
        type: string
        minLength: 1
      dev:
        type: string
        minLength: 1
    additionalProperties:
      type: string
      minLength: 1
    minProperties: 1
  structure:
    type: object
    minProperties: 1
    additionalProperties:
      type: string
      minLength: 1
  patterns:
    type: array
    items:
      type: string
  dependencies:
    type: array
    items:
      type: string
  metadata:
    type: object
    additionalProperties: true
additionalProperties: false
